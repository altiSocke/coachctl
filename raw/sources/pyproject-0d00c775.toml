[project]
name = "coachctl"
version = "0.1.0"
description = "coachctl — endurance training coach (MCP server + dashboard)"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27.0",
    "pyyaml>=6.0.2",
    "python-dotenv>=1.0.0",
    "jinja2>=3.1.0",
    "typer>=0.12",
]

[project.optional-dependencies]
dashboard = [
    "fastapi>=0.110",
    "uvicorn>=0.27",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27.0",
]

[project.scripts]
coachctl = "coachctl.cli:main"

[tool.setuptools.package-data]
"coachctl.dashboard" = ["app.html"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=src/coachctl --cov-report=term-missing"
asyncio_mode = "auto"

[tool.coverage.run]
source = ["src/coachctl"]
omit = ["*/dashboard/__main__.py", "*/cli.py", "*/update.py", "*/new_profile.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.ruff]
line-length = 100
target-version = "py311"
