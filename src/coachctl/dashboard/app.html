  const proj   = DATA.projected || [];
  const events = DATA.events    || [];
  const C      = chartColors();

  const lastTrendDate = trend.length ? trend[trend.length - 1].date : null;
  const projFilt = proj.filter(d => !lastTrendDate || d.date > lastTrendDate);

  const labels = [...trend.map(d => d.date), ...projFilt.map(d => d.date)];
  const split  = trend.length;
  const pad    = projFilt.length;

  const ctlA = [...trend.map(d => d.ctl),  ...Array(pad).fill(null)];
  const atlA = [...trend.map(d => d.atl),  ...Array(pad).fill(null)];
  const tsbA = [...trend.map(d => d.tsb),  ...Array(pad).fill(null)];
  const ctlP = [...Array(split).fill(null), ...projFilt.map(d => d.ctl)];
  const atlP = [...Array(split).fill(null), ...projFilt.map(d => d.atl)];
  const tsbP = [...Array(split).fill(null), ...projFilt.map(d => d.tsb)];

  const anns = {
    tsbBand: {
      type: 'box', yMin: 15, yMax: 25,
      backgroundColor: 'rgba(57,255,122,.04)', borderColor: 'rgba(57,255,122,.18)', borderWidth: 1,
    },
    tsbZero: {
      type: 'line', yMin: 0, yMax: 0,
      borderColor: isDark ? 'rgba(0,240,255,.15)' : 'rgba(0,0,0,.12)',
      borderWidth: 1, borderDash: [3, 3],
    },
    overreach: {
      type: 'line', yMin: -30, yMax: -30,
      borderColor: 'rgba(230,57,70,.25)', borderWidth: 1, borderDash: [4, 4],
    },
  };
  // "Projected" label at the split point
  if (lastTrendDate && projFilt.length) {
    anns.projLabel = {
      type: 'line', xMin: lastTrendDate, xMax: lastTrendDate,
      borderColor: isDark ? 'rgba(255,255,255,.15)' : 'rgba(0,0,0,.1)',
      borderWidth: 1, borderDash: [3, 3],
      label: {
        display: true, content: 'Projected →', position: 'start',
        backgroundColor: 'transparent',
        color: isDark ? 'rgba(255,255,255,.45)' : 'rgba(0,0,0,.35)',
        font: { family: "'Exo 2', sans-serif", size: 9 },
        padding: { x: 2, y: 0 },
      },
    };
  }
  events.forEach((ev, i) => {
    if (!labels.includes(ev.date)) return;
    const evPri = (ev.payload && ev.payload.priority) || ev.priority || 'C';
    const c = evPri === 'A' ? '#ff2d6b' : evPri === 'B' ? '#00f0ff' : '#2a2a5a';
    anns['ev' + i] = {
      type: 'line', xMin: ev.date, xMax: ev.date,
      borderColor: c + '88', borderWidth: evPri === 'A' ? 2 : 1,

        display: true, content: ev.name, position: 'start',

        font: { family: "'Barlow Condensed', sans-serif", size: 9, weight: '600' },
        padding: { x: 4, y: 2 }, borderRadius: 2,

    };

  const opts = {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: true, position: 'top', align: 'start',
        labels: { font: { family: "'Exo 2', sans-serif", size: 10 }, color: C.tick, boxWidth: 14, padding: 8,
          filter: item => !item.text.endsWith('*') },
      },
      annotation: { annotations: anns },
      tooltip: {
        backgroundColor: C.tip_bg, titleColor: C.tip_tx, bodyColor: C.tick,
        borderColor: C.tip_bd, borderWidth: 1,
        titleFont: { family: "'Barlow Condensed', sans-serif", weight: '700', size: 12 },
        bodyFont:  { family: "'Exo 2', sans-serif", size: 11 },
        callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1) ?? ''}` },
      },
    },
    scales: {
      x: {
        type: 'category',
        ticks: { color: C.tick, font: { family: "'Exo 2', sans-serif", size: 9 }, maxTicksLimit: 8, maxRotation: 0 },
        grid: { color: C.grid }, border: { display: false },
      },
      y: {
        ticks: { color: C.tick, font: { family: "'Exo 2', sans-serif", size: 9 } },
        grid: { color: C.grid }, border: { display: false },
      },
    },
  };

  const datasets = [
  { label: 'CTL',   data: ctlA, borderColor: '#00f0ff', borderWidth: 2, pointRadius: 0, tension: .3 },
  { label: 'ATL',   data: atlA, borderColor: '#ff6b1a', borderWidth: 2, pointRadius: 0, tension: .3 },
  { label: 'Form',  data: tsbA, borderColor: '#39ff7a', borderWidth: 2, pointRadius: 0, tension: .3 },
  { label: 'CTL*',  data: ctlP, borderColor: '#00f0ff66', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, tension: .3 },
  { label: 'ATL*',  data: atlP, borderColor: '#ff6b1a66', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, tension: .3 },
  { label: 'Form*', data: tsbP, borderColor: '#39ff7a66', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, tension: .3 },
  ].map(d => ({ ...d, backgroundColor: 'transparent', fill: false }));

  const ctx = document.getElementById('chart-fitness').getContext('2d');
  if (chartFit) chartFit.destroy();
  chartFit = new Chart(ctx, { type: 'line', data: { labels, datasets }, options: opts });
}

function renderTssChart() {
  const weekly = DATA.weekly_tss || [];
  const C      = chartColors();
  const t      = today();

  // Monday of current week
  const todayDate = new Date(t + 'T00:00:00');
  const dow = todayDate.getDay();
  const todayMon = new Date(todayDate);
  todayMon.setDate(todayDate.getDate() - ((dow + 6) % 7));
  const todayMonStr = todayMon.toISOString().slice(0, 10);

  const labels = weekly.map(w => w.week.slice(5));
  const run    = weekly.map(w => w.run   || 0);
  const ride   = weekly.map(w => w.ride  || 0);
  const other  = weekly.map(w => w.other || 0);
  const target = weekly.map(w => w.target || null);

  // Future weeks: week > todayMon → use lower opacity bars
  const isFuture = weekly.map(w => w.week > todayMonStr);

  // Per-bar colours (future = dimmed)
  const runColors   = isFuture.map(f => f ? '#c060ff33' : '#c060ffaa');
  const rideColors  = isFuture.map(f => f ? '#ff6b1a33' : '#ff6b1aaa');
  const otherColors = isFuture.map(f => f ? '#55555533' : '#55555588');

  // "Today" vertical annotation + race event annotations
  const anns = {};

  // Today line
  const todayLabelIdx = labels.indexOf(todayMonStr.slice(5));
  if (todayLabelIdx !== -1) {
    anns.todayLine = {
      type: 'line',
      xMin: labels[todayLabelIdx], xMax: labels[todayLabelIdx],
      borderColor: isDark ? 'rgba(255,255,255,.25)' : 'rgba(0,0,0,.18)',
      borderWidth: 1, borderDash: [3, 3],
      label: {
        display: true, content: 'now', position: 'end',
        backgroundColor: 'transparent',
        color: isDark ? 'rgba(255,255,255,.4)' : 'rgba(0,0,0,.35)',
        font: { family: "'Exo 2', sans-serif", size: 8 },
        padding: { x: 2, y: 0 },
      },
    };
  }

  // Race events on TSS chart (A + B priority only, or all if <5)
  const raceEvs = raceEvents().filter(ev => {
    const evPri = (ev.payload && ev.payload.priority) || ev.priority || 'C';
    return evPri === 'A' || evPri === 'B';
  });
  raceEvs.forEach((ev, i) => {
    // Find which week label this race falls in
    const evDate = new Date(ev.date + 'T00:00:00');
    const evDow  = evDate.getDay();
    const evMon  = new Date(evDate);
    evMon.setDate(evDate.getDate() - ((evDow + 6) % 7));
    const evMonLabel = evMon.toISOString().slice(5, 10);
    if (!labels.includes(evMonLabel)) return;
    const evPri = (ev.payload && ev.payload.priority) || ev.priority || 'C';
    const c = evPri === 'A' ? '#ff2d6b' : '#00f0ff';
    anns['race' + i] = {
      type: 'line', xMin: evMonLabel, xMax: evMonLabel,
      borderColor: c + '66', borderWidth: evPri === 'A' ? 2 : 1.5, borderDash: [2, 2],
      label: {
        display: true, content: ev.name.split(/[—–(]/)[0].trim().slice(0, 16),
        position: 'start',
        backgroundColor: c, color: '#fff',
        font: { family: "'Barlow Condensed', sans-serif", size: 8, weight: '600' },
        padding: { x: 3, y: 1 }, borderRadius: 2,
      },
    };
  });

  const ctx = document.getElementById('chart-tss').getContext('2d');
  if (chartTss) chartTss.destroy();
  chartTss = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Run',    data: run,    backgroundColor: runColors,   stack: 'tss', borderRadius: 2 },
        { label: 'Ride',   data: ride,   backgroundColor: rideColors,  stack: 'tss', borderRadius: 2 },
        { label: 'Other',  data: other,  backgroundColor: otherColors, stack: 'tss', borderRadius: 2 },
        { label: 'Planned', data: target, type: 'line',
          borderColor: C.target, backgroundColor: 'transparent',
          borderWidth: 1.5, borderDash: [4, 3], pointRadius: 0, tension: 0 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true, position: 'top', align: 'start',
          labels: { font: { family: "'Exo 2', sans-serif", size: 10 }, color: C.tick, boxWidth: 12, padding: 8 },
        },
        annotation: { annotations: anns },
        tooltip: {
          backgroundColor: C.tip_bg, titleColor: C.tip_tx, bodyColor: C.tick,
          borderColor: C.tip_bd, borderWidth: 1,
          titleFont: { family: "'Barlow Condensed', sans-serif", weight: '700', size: 12 },
          bodyFont:  { family: "'Exo 2', sans-serif", size: 11 },
          callbacks: {
            afterTitle: items => {
              const idx = items[0]?.dataIndex;
              return isFuture[idx] ? ['  ⟵ predicted'] : [];
            },
          },
        },
      },
      scales: {
        x: {
          stacked: true,
          ticks: { color: C.tick, font: { family: "'Exo 2', sans-serif", size: 9 }, maxRotation: 0, maxTicksLimit: 12 },
          grid: { display: false }, border: { display: false },
        },
        y: {
          stacked: true,
          ticks: { color: C.tick, font: { family: "'Exo 2', sans-serif", size: 9 } },
          grid: { color: C.grid }, border: { display: false },
        },
      },
    },
  });
}

function renderRtssChart() {
  const weekly = DATA.weekly_run_tss || [];
  const C      = chartColors();
  if (!weekly.length) { hide('rtss-chart-card'); return; }
  show('rtss-chart-card');

  const labels     = weekly.map(w => w.week.slice(5));
  const rtss       = weekly.map(w => w.rtss        || 0);
  const rtss_power = weekly.map(w => w.rtss_power != null ? w.rtss_power : null);

  const ctx = document.getElementById('chart-rtss').getContext('2d');
  if (chartRtss) chartRtss.destroy();
  chartRtss = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'rTSS (pace)',    data: rtss,       backgroundColor: '#6366f1aa', borderRadius: 2 },
        { label: 'rTSS_P (power)', data: rtss_power, backgroundColor: '#22c55eaa', borderRadius: 2,
          type: 'line', borderColor: '#22c55e', borderWidth: 2, pointRadius: 3,
          pointBackgroundColor: '#22c55e', tension: .2, fill: false },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true, position: 'top', align: 'start',
          labels: { font: { family: "'Exo 2', sans-serif", size: 10 }, color: C.tick, boxWidth: 12, padding: 8 },
        },
        tooltip: {
          backgroundColor: C.tip_bg, titleColor: C.tip_tx, bodyColor: C.tick,
          borderColor: C.tip_bd, borderWidth: 1,
          titleFont: { family: "'Barlow Condensed', sans-serif", weight: '700', size: 12 },
          bodyFont:  { family: "'Exo 2', sans-serif", size: 11 },
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v == null) return '';
              return ` ${ctx.dataset.label}: ${Math.round(v)}`;
            },
            afterBody: items => {
              const pace  = items.find(i => i.dataset.label.includes('pace'));
              const power = items.find(i => i.dataset.label.includes('power'));
              if (pace && power && power.parsed.y != null && pace.parsed.y > 0) {
                const delta = Math.round(power.parsed.y - pace.parsed.y);
                const pct   = Math.round((power.parsed.y / pace.parsed.y - 1) * 100);
                return [`  Δ ${delta > 0 ? '+' : ''}${delta} (${pct > 0 ? '+' : ''}${pct}%)`];
              }
              return [];
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { color: C.tick, font: { family: "'Exo 2', sans-serif", size: 9 }, maxRotation: 0, maxTicksLimit: 12 },
          grid: { display: false }, border: { display: false },
        },
        y: {
          ticks: { color: C.tick, font: { family: "'Exo 2', sans-serif", size: 9 } },
          grid: { color: C.grid }, border: { display: false },
        },
      },
    },
  });
}

// ── Goals ─────────────────────────────────────────────────────────────────── 

function renderGoals() {
  const goals = DATA.goals || {};
  const list  = document.getElementById('goals-list');
  list.innerHTML = '';
  let any = false;
  ['running', 'cycling'].forEach(sport => {
    const items = goals[sport] || [];
    if (!items.length) return;
    any = true;
    const lbl = el('div', 'goal-sport');
    lbl.textContent = sport.charAt(0).toUpperCase() + sport.slice(1);
    list.appendChild(lbl);
    items.forEach(g => {
      const item = el('div', 'goal-item');
      item.textContent = g;
      list.appendChild(item);
    });
  });
  if (!any) hide('goals-card');
  else show('goals-card');
}

// ── Recent runs ───────────────────────────────────────────────────────────── 

function renderRecentRuns() {
  const runs = DATA.recent_runs || [];
  const container = document.getElementById('recent-runs-table');
  if (!runs.length) { hide('recent-runs-card'); return; }

  const filtered = runs.filter(r => (r.rtss != null || r.rtss_power != null) && (r.dist_km == null || r.dist_km >= 3)).slice(0, 7);
  if (!filtered.length) { hide('recent-runs-card'); return; }
  show('recent-runs-card');

  let html = `<table class="runs-table">
    <thead><tr>
      <th>Date</th><th>km</th><th>+m</th><th>rTSS</th><th>rTSS<sub>P</sub></th><th title="Economy gap: power-based vs pace-based rTSS. Positive = power exceeds pace cost (inefficiency or wind/terrain). Negative = good economy.">Eco</th>
    </tr></thead><tbody>`;

  filtered.forEach(r => {
    const rtss  = r.rtss       != null ? r.rtss.toFixed(0)       : '—';
    const rtssP = r.rtss_power != null ? r.rtss_power.toFixed(0) : '—';
    let delta = '';
    if (r.rtss != null && r.rtss_power != null && r.rtss > 0) {
      const pct = Math.round((r.rtss_power / r.rtss - 1) * 100);
      delta = `<span class="rtss-delta ${pct > 10 ? 'up' : ''}">${pct > 0 ? '+' : ''}${pct}%</span>`;
    }
    const shortName = (r.name || '').length > 18 ? r.name.slice(0, 18) + '…' : r.name;
    html += `<tr>
      <td class="run-name" title="${esc(r.name)}">${esc(r.date ? r.date.slice(5) : '')} <span style="color:var(--muted);font-size:.7rem">${esc(shortName)}</span></td>
      <td>${r.dist_km != null ? r.dist_km : '—'}</td>
      <td>${r.elev_m  != null ? r.elev_m  : '—'}</td>
      <td>${rtss}</td>
      <td class="rtss-p">${rtssP}</td>
      <td>${delta}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ── Utilities ─────────────────────────────────────────────────────────────── 

function el(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
function hide(id) { document.getElementById(id)?.classList.add('hidden'); }

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function splitDayLabel(label) {
  const parts = (label || '').split(' ');
  if (parts.length >= 3) return [parts[0].toUpperCase(), parts.slice(1).join(' ')];
  return [(label || '').toUpperCase(), ''];
}

function shortDetail(d) {
  if (!d) return '';
  const s = d
    .replace(/\|[^\n]+/g, '')
    .replace(/~~(.+?)~~/g, '$1')
    .replace(/\*\*/g, '')
    .replace(/\*/g,  '')
    .replace(/`/g,   '')
    .replace(/\n/g,  ' ')
    .trim();
  return s.length > 90 ? s.slice(0, 90) + '...' : s;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

function mdToHtml(text) {
  if (!text) return '';
  let h = esc(text);
  h = renderMdTables(h);
  h = h.replace(/~~(.+?)~~/g, '<s>$1</s>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\n(?![^<]*<\/table>)/g, '<br>');
  return h;
}

function renderMdTables(src) {
  const lines = src.split('\n');
  const out = [];
  let i = 0;
  const isPipeRow = (s) => /^\s*\|.*\|\s*$/.test(s);
  const isSepRow  = (s) => /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(s);
  while (i < lines.length) {
    if (isPipeRow(lines[i]) && i + 1 < lines.length && isSepRow(lines[i + 1])) {
      const header = splitRow(lines[i]);
      i += 2;
      const rows = [];
      while (i < lines.length && isPipeRow(lines[i])) {
        rows.push(splitRow(lines[i]));
        i++;
      }
      out.push(buildTable(header, rows));
      if (i < lines.length && lines[i].trim() === '') i++;
    } else {
      out.push(lines[i]);
      i++;
    }
  }
  return out.join('\n');
}
function splitRow(s) {
  let t = s.trim();
  if (t.startsWith('|')) t = t.slice(1);
  if (t.endsWith('|'))   t = t.slice(0, -1);
  return t.split('|').map(c => c.trim());
}
function buildTable(header, rows) {
  const th  = header.map(c => `<th>${c}</th>`).join('');
  const trs = rows.map(r => '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
  return `<table class="md-table"><thead><tr>${th}</tr></thead><tbody>${trs}</tbody></table>`;
}
